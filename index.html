<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>UTC Определение</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #cbd5f5;
        }

        .utc {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            color: #38bdf8;
        }

        .hint {
            font-size: 22px;
            color: #94a3b8;
            margin-top: 20px;
        }

        .value {
            font-weight: bold;
            color: #22c55e;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Ваше UTC-смещение:</h1>

    <div id="utc" class="utc">...</div>

    <div class="hint">
        В программе надо ввести значение:
        <span id="utc_value" class="value"></span>
    </div>
</div>

<script>
    const offset = -new Date().getTimezoneOffset() / 60;

    const formatted = (offset > 0 ? "+" : "") + offset;

    document.getElementById("utc").innerText = formatted;
    document.getElementById("utc_value").innerText = `"${formatted}"`;
</script>

</body>
</html>
